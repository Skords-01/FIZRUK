name: Docs freshness check

on:
  schedule:
    - cron: "0 7 * * *" # daily 07:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: docs-freshness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"

      - run: node scripts/docs/check-freshness.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
