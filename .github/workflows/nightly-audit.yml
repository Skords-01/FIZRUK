name: Nightly full audit + dependency check

on:
  schedule:
    - cron: "0 3 * * *" # UTC 03:00 daily
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write
  actions: read

concurrency:
  group: nightly-audit
  cancel-in-progress: true

jobs:
  pnpm-audit-full:
    name: pnpm audit (full report)
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Full audit (JSON)
        id: audit
        run: |
          set +e
          pnpm audit --json > pnpm-audit.json 2>&1
          AUDIT_EXIT=$?
          set -e

          CRITICAL=$(jq '[.advisories // {} | to_entries[] | select(.value.severity == "critical")] | length' pnpm-audit.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.advisories // {} | to_entries[] | select(.value.severity == "high")] | length' pnpm-audit.json 2>/dev/null || echo 0)

          echo "critical=${CRITICAL}" >> "$GITHUB_OUTPUT"
          echo "high=${HIGH}" >> "$GITHUB_OUTPUT"

          echo "### pnpm audit summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Critical | ${CRITICAL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| High | ${HIGH} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Audit exit code | ${AUDIT_EXIT} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit report
        if: ${{ !cancelled() }}
        # actions/upload-artifact v4.4.3 (SHA-pinned)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: pnpm-audit-report
          path: pnpm-audit.json
          retention-days: 30

      - name: Fail on critical/high
        if: ${{ steps.audit.outputs.critical != '0' || steps.audit.outputs.high != '0' }}
        run: |
          echo "::error::Found ${{ steps.audit.outputs.critical }} critical and ${{ steps.audit.outputs.high }} high vulnerabilities"
          exit 1

  osv-scanner:
    name: OSV-Scanner dependency check
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install osv-scanner v2.3.5
        run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Run osv-scanner
        id: scan
        run: |
          set +e
          osv-scanner --format sarif --output osv-scanner.sarif --recursive ./
          SCAN_EXIT=$?
          set -e
          echo "exit_code=${SCAN_EXIT}" >> "$GITHUB_OUTPUT"

      - name: Upload SARIF to code-scanning
        if: ${{ !cancelled() }}
        # github/codeql-action/upload-sarif v4.35.2 (SHA-pinned)
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          sarif_file: osv-scanner.sarif

      - name: Upload SARIF artifact
        if: ${{ !cancelled() }}
        # actions/upload-artifact v4.4.3 (SHA-pinned)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: osv-scanner-sarif
          path: osv-scanner.sarif
          retention-days: 30

      - name: Check for critical/high vulnerabilities
        run: |
          ERRORS=$(jq '[.runs[]?.results[]? | select(.level == "error")] | length' osv-scanner.sarif 2>/dev/null || echo 0)

          echo "### OSV-Scanner summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Critical/High vulnerabilities (SARIF level=error): ${ERRORS}" >> "$GITHUB_STEP_SUMMARY"

          if [ "${ERRORS}" -gt 0 ]; then
            echo "::error::Found ${ERRORS} critical/high vulnerabilities in OSV-Scanner results"
            exit 1
          fi

  snyk:
    name: Snyk dependency check (optional)
    if: ${{ secrets.SNYK_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --all-projects --severity-threshold=high --json-file-output=snyk-report.json || true

      - name: Upload Snyk report
        if: ${{ !cancelled() }}
        # actions/upload-artifact v4.4.3 (SHA-pinned)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: snyk-report
          path: snyk-report.json
          retention-days: 30

  notify-failure:
    name: Create/update issue on nightly audit failure
    needs: [pnpm-audit-full, osv-scanner]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      # actions/github-script v8.0.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const TITLE = 'Nightly audit failure';
            const MARKER = '<!-- nightly-audit-failure-marker -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString().slice(0, 10);

            const body = [
              MARKER,
              `## Nightly audit failed — ${now}`,
              '',
              `**Workflow run:** ${runUrl}`,
              '',
              'One or more nightly audit jobs reported critical/high vulnerabilities.',
              'Please triage according to [docs/security/nightly-audit.md](../docs/security/nightly-audit.md).',
              '',
              `> Auto-generated by \`nightly-audit.yml\`. Last updated: ${new Date().toISOString()}.`,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'nightly-audit-failed,security',
              state: 'open',
              per_page: 10,
            });

            const existing = issues.find((i) => i.title === TITLE && i.body?.includes(MARKER));

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated existing issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: TITLE,
                body,
                labels: ['nightly-audit-failed', 'security'],
              });
              core.info(`Created issue #${created.data.number}`);
            }
