name: Detox (iOS)

# Mobile E2E lane for the iOS Detox suites in `apps/mobile/e2e/*`.
# Kept separate from the main `CI` workflow in `.github/workflows/ci.yml`
# because:
#   - It runs on `macos-14` (≈3× the cost of `ubuntu-latest`).
#   - The iOS simulator boot + `expo prebuild` + `xcodebuild` pipeline
#     takes >10 min, so we only want it on `main` / mobile-scoped PRs.
#   - A failing Detox run should not block an unrelated web-only PR.
#
# Android CI lives in `.github/workflows/detox-android.yml` — they share
# the same suite set (`apps/mobile/e2e/*.e2e.ts`) and the same
# `pnpm e2e:*` entry points.

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/finyk-domain/**"
      - "packages/routine-domain/**"
      - "packages/api-client/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/detox-ios.yml"
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/finyk-domain/**"
      - "packages/routine-domain/**"
      - "packages/api-client/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/detox-ios.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: detox-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detox-ios:
    runs-on: macos-14
    timeout-minutes: 60
    env:
      EXPO_PUBLIC_E2E: "1"
      E2E_BUILD: "1"
      # `@sentry/react-native` injects a `sentry-cli` upload step into
      # xcodebuild that aborts with `An organization ID or slug is
      # required` whenever SENTRY_ORG / SENTRY_PROJECT / SENTRY_AUTH_TOKEN
      # are unset — which they are on every CI run except EAS release
      # lanes. Disabling the auto-upload turns the step into an explicit
      # no-op so Detox can finish building the app.
      SENTRY_DISABLE_AUTO_UPLOAD: "true"
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Setup Detox CLI + simulator utils
        run: |
          brew tap wix/brew
          brew install applesimutils

      # Detox drives the binary produced by `expo prebuild` + `xcodebuild`.
      # `--platform ios` so we don't waste macOS minutes on Android projects
      # that the matching Android workflow will regenerate anyway.
      - name: Prebuild iOS project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild --platform ios --clean --non-interactive

      - name: Pod install
        working-directory: apps/mobile/ios
        run: pod install --repo-update

      - name: Build Detox iOS app
        working-directory: apps/mobile
        run: pnpm e2e:build:ios

      - name: Run Detox iOS suite
        working-directory: apps/mobile
        run: pnpm e2e:test:ios -- --headless --record-logs all

      - name: Upload Detox artefacts on failure
        if: always()
        # actions/upload-artifact v6.0.0 (SHA-pinned for supply-chain hardening)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: detox-ios-artifacts
          path: apps/mobile/.detox-artifacts
          if-no-files-found: ignore
