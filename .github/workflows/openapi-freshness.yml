name: OpenAPI freshness check

# Гарантує, що `docs/api/openapi.json` синхронний із zod-схемами у
# `packages/shared/src/schemas/api.ts` + route-каталогом у
# `packages/shared/src/openapi/routes.ts`. Якщо PR змінює схему чи додає
# route, але не оновив `openapi.json` — fail. Це закриває API-contract drift
# rule #3 з AGENTS.md (server response shape ↔ api-client types ↔ test).
#
# ADR: docs/adr/0023-openapi-generation.md
# Скрипт: scripts/api/check-openapi-fresh.mjs

on:
  pull_request:
    paths:
      - "packages/shared/src/schemas/**"
      - "packages/shared/src/openapi/**"
      - "docs/api/openapi.json"
      - "scripts/api/**"
      - ".github/workflows/openapi-freshness.yml"
  push:
    branches: [main]
    paths:
      - "packages/shared/src/schemas/**"
      - "packages/shared/src/openapi/**"
      - "docs/api/openapi.json"
      - "scripts/api/**"

permissions:
  contents: read

concurrency:
  group: openapi-freshness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: docs/api/openapi.json ≡ zod-schemas
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (SHA-pinned for supply-chain hardening)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # pnpm/action-setup v6.0.3 (SHA-pinned for supply-chain hardening)
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e

      # actions/setup-node v6.4.0 (SHA-pinned for supply-chain hardening)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check openapi.json freshness
        run: pnpm api:check-openapi
