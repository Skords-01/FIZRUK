global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: sergeant

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: n8n
    static_configs:
      - targets: ["n8n:5678"]
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: sergeant-server
    static_configs:
      - targets: ["host.docker.internal:3000"]
    scheme: http
    metrics_path: /metrics
    authorization:
      credentials: "__METRICS_TOKEN__"
    scrape_interval: 15s
    scrape_timeout: 10s
