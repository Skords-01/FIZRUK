global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: sergeant

scrape_configs:
  - job_name: sergeant-server
    # Scrapes the Express /metrics endpoint (prom-client).
    # METRICS_TOKEN must match the server's METRICS_TOKEN env var.
    static_configs:
      - targets:
          # host.docker.internal resolves to the Docker host on Mac/Windows.
          # On Linux add: --add-host=host.docker.internal:host-gateway
          - "${SERVER_METRICS_HOST:-host.docker.internal}:${SERVER_PORT:-3000}"
    scheme: http
    metrics_path: /metrics
    authorization:
      credentials: "${METRICS_TOKEN}"
    scrape_interval: 15s
    scrape_timeout: 10s
